<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0D0A06"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <!-- Eight-point star (Ottoman/Seljuk motif) -->
  <g transform="translate(256,256)" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.85">
    <rect x="-95" y="-95" width="190" height="190" transform="rotate(0)"/>
    <rect x="-95" y="-95" width="190" height="190" transform="rotate(45)"/>
  </g>
  <!-- Central eye -->
  <g transform="translate(256,256)">
    <path d="M -78 0 Q 0 -55 78 0 Q 0 55 -78 0 Z" fill="none" stroke="url(#gold)" stroke-width="4"/>
    <circle cx="0" cy="0" r="30" fill="url(#gold)" opacity="0.9"/>
    <circle cx="0" cy="0" r="14" fill="#0D0A06"/>
    <circle cx="-6" cy="-6" r="5" fill="#E8C96A"/>
  </g>
  <!-- Small dots top/bottom -->
  <circle cx="256" cy="60" r="6" fill="url(#gold)"/>
  <circle cx="256" cy="452" r="6" fill="url(#gold)"/>
</svg>
